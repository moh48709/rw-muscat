<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل المرأة الريفية — إدارة مسقط للثروة الزراعية وموارد المياه</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Reem+Kufi:wght@500&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════════
     محمّل المنصة — هذا الملف يُرفع إلى GitHub مرة واحدة فقط
     ولا يحتاج أي تحديث مستقبلاً. الواجهة الفعلية تُقدَّم من ملف
     app.html داخل مشروع Google Apps Script.
     ═══════════════════════════════════════════════════════════ */
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(900px 500px at 50% -100px, #1E5646 0%, #123A30 45%, #0C2620 100%);
    font-family:'Reem Kufi','Cairo',sans-serif;color:#EAD189;text-align:center;
  }
  .box{padding:30px;}
  .crest{width:76px;height:76px;margin:0 auto 18px;animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.07);opacity:.85;}}
  h1{font-family:'Aref Ruqaa',serif;font-size:30px;margin:0 0 6px;
     background:linear-gradient(180deg,#EAD189,#C9A24B 55%,#A57F2C);
     -webkit-background-clip:text;background-clip:text;color:transparent;}
  p{font-size:13px;color:#CBE3D6;margin:4px 0 22px;}
  .spin{width:34px;height:34px;border-radius:50%;margin:0 auto;
    border:3.5px solid rgba(201,162,75,.25);border-top-color:#EAD189;
    animation:rot .9s linear infinite;}
  @keyframes rot{to{transform:rotate(360deg);}}
  .err{display:none;}
  .err button{
    font-family:'Reem Kufi',sans-serif;font-weight:600;font-size:14px;
    background:linear-gradient(135deg,#EAD189,#C9A24B,#A57F2C);color:#0C2620;
    border:none;border-radius:10px;padding:11px 30px;cursor:pointer;margin-top:8px;
  }
</style>
</head>
<body>
<div class="box">
  <svg class="crest" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAD189"/><stop offset=".55" stop-color="#C9A24B"/><stop offset="1" stop-color="#A57F2C"/>
    </linearGradient></defs>
    <path d="M50 4 C68 20 88 22 88 48 C88 74 68 90 50 96 C32 90 12 74 12 48 C12 22 32 20 50 4 Z" fill="none" stroke="url(#g)" stroke-width="2.5"/>
    <path d="M50 22 L56.5 40 L75 40.5 L60.5 52 L66 70 L50 59.5 L34 70 L39.5 52 L25 40.5 L43.5 40 Z" fill="url(#g)"/>
  </svg>
  <h1>سجل المرأة الريفية العمانية</h1>
  <p>قسم المرأة الريفية بمحافظة مسقط</p>
  <div class="spin" id="spin"></div>
  <div class="err" id="err">
    <p style="color:#E8CFC7;">تعذّر تحميل المنصة — تحققي من الاتصال بالإنترنت</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
</div>
<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyn_ySOT5PVmmANgUfyMTlxhQ4xE8svsoa_6-EwaijvFlvYZqkM2h4KkVokDyU8diJGpQ/exec';

function fail(msg){
  document.getElementById('spin').style.display = 'none';
  const err = document.getElementById('err');
  err.style.display = 'block';
  err.querySelector('p').textContent = msg;
}
fetch(APPS_SCRIPT_URL + '?page=app')
  .then(r => r.json())
  .then(j => {
    if(j && j.success && j.html){
      document.open();
      document.write(j.html);
      document.close();
    }else if(j && j.success && !j.html){
      fail('النسخة المنشورة من السكربت قديمة — نفّذي: Manage deployments ← ✏ ← New version ← Deploy');
    }else{
      fail('خطأ من السكربت: ' + ((j && j.error) || 'غير معروف') + ' — تأكدي من وجود ملف باسم app في المشروع');
    }
  })
  .catch(() => fail('تعذّر الوصول للسكربت — تحققي من الاتصال بالإنترنت ثم أعيدي المحاولة'));
</script>
</body>
</html>
